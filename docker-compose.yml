version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: orientate_guidance_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: guidance_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    container_name: orientate_guidance_service
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      JWT_SECRET: supersecretsharedkeywithauthservice
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: guidance_db
    depends_on:
      - database

volumes:
  pgdata:
